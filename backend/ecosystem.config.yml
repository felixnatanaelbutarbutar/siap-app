apps:
  - name: siap-backend
    script: dist/index.js
    cwd: /app/backend
    instances: 1
    exec_mode: fork
    watch: false
    env:
      NODE_ENV: production
      PORT: 3000
    error_file: /app/logs/backend-error.log
    out_file: /app/logs/backend-out.log
    log_date_format: "YYYY-MM-DD HH:mm:ss"
    max_memory_restart: 512M
    restart_delay: 3000
    max_restarts: 10
