version: '3.8'

services:
  # Database PostgreSQL
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-siap_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siap_password}
      POSTGRES_DB: ${POSTGRES_DB:-siap_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - siap_network

  # File Storage MinIO
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-siap_minio_access}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-siap_minio_secret}
    volumes:
      - minio_data:/data
    networks:
      - siap_network
      
  # Init MinIO (Create buckets)
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-siap_minio_access} ${MINIO_ROOT_PASSWORD:-siap_minio_secret};
      mc mb myminio/siap-bucket --ignore-existing;
      mc anonymous set public myminio/siap-bucket;
      exit 0;
      "
    networks:
      - siap_network

  # Backend Node.js
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-siap_user}:${POSTGRES_PASSWORD:-siap_password}@postgres:5432/${POSTGRES_DB:-siap_db}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-siap_minio_access}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-siap_minio_secret}
      - MINIO_BUCKET_NAME=siap-bucket
    depends_on:
      - postgres
      - minio
    networks:
      - siap_network

  # Nginx Reverse Proxy & Static Server
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ../web-admin/dist:/usr/share/nginx/html:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - backend
    networks:
      - siap_network

volumes:
  postgres_data:
  minio_data:
  nginx_certs:

networks:
  siap_network:
    driver: bridge
