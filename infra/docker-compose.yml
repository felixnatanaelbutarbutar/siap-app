version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: siap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: siap_user
      POSTGRES_PASSWORD: felixexe131105
      POSTGRES_DB: siap_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siap_user -d siap_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: siap-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: siap_minio_access
      MINIO_ROOT_PASSWORD: felixexe131105
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # MinIO bucket initialization (run once)
  minio-init:
    image: minio/mc:latest
    container_name: siap-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set siap http://minio:9000 siap_minio_access felixexe131105;
        mc mb --ignore-existing siap/siap-storage;
        mc anonymous set download siap/siap-storage;
        echo 'MinIO bucket siap-storage created.';
      "

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
