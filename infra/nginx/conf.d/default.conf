server {
    listen 80;
    server_name _; # Menangkap semua domain / IP

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # 1. Routing API ke Backend (Node.js)
    location /api/ {
        proxy_pass http://backend:3000/; # Hapus /api/ saat forward ke backend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. Routing Web Admin (Static React/Vite)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # TanStack Router fallback
        try_files $uri $uri/ /index.html;
    }

    # Custom Error Pages
    error_page 404 /index.html; # Biarkan TanStack Router yang handle 404
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
